<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Dashboard Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg-soft: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-soft);
            -webkit-tap-highlight-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .app-icon-squircle {
            border-radius: 22%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease;
        }

        .app-icon-squircle:active {
            transform: scale(0.92);
        }

        .floating-back {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex justify-center">

    <div id="app" class="w-full max-w-md min-h-screen bg-white relative overflow-hidden flex flex-col shadow-2xl">
        <!-- Modern Header (Admin Only) -->
        <header id="main-header" class="px-8 py-7 flex justify-between items-center bg-white sticky top-0 z-30">
            <div id="header-text">
                <h1 id="view-title" class="text-2xl font-extrabold tracking-tight text-slate-900">Dashboard</h1>
                <p id="view-subtitle" class="text-[10px] text-indigo-500 uppercase tracking-[0.2em] font-bold">Personal Space</p>
            </div>
            <div class="flex gap-2" id="header-nav">
                <button id="back-btn-header" class="hidden p-2.5 bg-slate-50 text-slate-600 rounded-2xl transition-all">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
                <button id="home-btn" class="p-2.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-2xl transition-all">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto custom-scrollbar">
            <!-- Konten dimuat di sini -->
        </main>

        <!-- Bottom Navigation (Admin Only) -->
        <nav id="bottom-nav" class="bg-white/90 backdrop-blur-lg border-t border-slate-50 flex justify-around items-center px-6 py-4 sticky bottom-0 z-30 shrink-0 transition-transform duration-300">
            <button onclick="router.navigate('list')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
                <i data-lucide="grid" class="w-6 h-6"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Koleksi</span>
            </button>
            
            <button onclick="router.navigate('create')" class="relative -top-8 flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-xl shadow-indigo-100 hover:scale-110 active:scale-95 transition-all">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>

            <button onclick="router.navigate('settings')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition-colors">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Opsi</span>
            </button>
        </nav>
    </div>

    <script>
        let state = {
            menus: JSON.parse(localStorage.getItem('custom_menus')) || [],
            currentView: 'list',
            editingIndex: null,
            tempApps: [],
            tempOwnerName: "",
            editingTempAppIndex: null,
            currentMenuIndex: null,
            isInitialLoad: true,
            isDirectMode: false // Menandai jika dibuka via ?view=...
        };

        const saveState = () => {
            localStorage.setItem('custom_menus', JSON.stringify(state.menus));
        };

        const fixDriveUrl = (url) => {
            if (!url) return "";
            const driveMatch = url.match(/\/file\/d\/([^\/\?]+)/) || url.match(/id=([^\&]+)/);
            if (driveMatch && (url.includes('drive.google.com') || url.includes('docs.google.com'))) {
                return `https://drive.google.com/thumbnail?authuser=0&sz=w600&id=${driveMatch[1]}`;
            }
            return url;
        };

        window.handleImgError = (img) => {
            img.style.display = 'none';
            const fallback = img.nextElementSibling;
            if (fallback) fallback.classList.remove('hidden');
        };

        const copyText = (textId) => {
            const copyInput = document.getElementById(textId);
            copyInput.select();
            document.execCommand("copy");
            const btn = document.getElementById('copy-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-500"></i>';
            lucide.createIcons();
            setTimeout(() => { btn.innerHTML = originalHTML; lucide.createIcons(); }, 2000);
        };

        const renderList = () => {
            const container = document.getElementById('main-content');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('bottom-nav').style.transform = 'translateY(0)';
            document.getElementById('back-btn-header').classList.add('hidden');
            document.getElementById('view-title').innerText = "Dashboard";
            document.getElementById('view-subtitle').innerText = "Koleksi Aktif";

            if (state.menus.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 px-10 text-center animate-fade-in">
                        <div class="w-20 h-20 bg-slate-50 rounded-[2rem] flex items-center justify-center mb-6">
                            <i data-lucide="layout" class="w-8 h-8 text-slate-300"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">Mulai Buat Menu</h3>
                        <p class="text-xs text-slate-400 mt-2">Buat dashboard kustom Anda sendiri.</p>
                    </div>
                `;
            } else {
                container.innerHTML = `
                <div class="p-6 space-y-4">
                    ${state.menus.map((menu, idx) => `
                        <div class="bg-white rounded-3xl border border-slate-50 p-4 flex items-center gap-4 hover:bg-slate-50 transition-all animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                            <div onclick="router.navigate('view', ${idx})" class="flex flex-1 items-center gap-4 cursor-pointer">
                                <div class="w-14 h-14 rounded-2xl bg-indigo-500 flex items-center justify-center text-white font-bold text-xl overflow-hidden shadow-lg shadow-indigo-100">
                                    ${menu.apps[0]?.icon ? `<img src="${fixDriveUrl(menu.apps[0].icon)}" referrerpolicy="no-referrer" class="w-full h-full object-cover" onerror="handleImgError(this)">` : ''}
                                    <span class="img-fallback ${menu.apps[0]?.icon ? 'hidden' : ''}">${menu.owner.charAt(0).toUpperCase()}</span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-900">${menu.owner}</h4>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${menu.apps.length} Aplikasi</span>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="router.navigate('create', ${idx})" class="p-2 text-slate-300 hover:text-indigo-600 transition-all"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
                                <button onclick="router.deleteMenu(${idx})" class="p-2 text-slate-300 hover:text-rose-500 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }
            lucide.createIcons();
        };

        const renderCreate = (editIndex = null) => {
            if (state.isInitialLoad) {
                if (editIndex !== null) {
                    state.editingIndex = editIndex;
                    state.tempApps = [...state.menus[editIndex].apps];
                    state.tempOwnerName = state.menus[editIndex].owner;
                } else {
                    state.editingIndex = null;
                    state.tempApps = [];
                    state.tempOwnerName = "";
                }
                state.editingTempAppIndex = null;
                state.isInitialLoad = false;
            }

            const isEdit = state.editingIndex !== null;
            const isEditingApp = state.editingTempAppIndex !== null;
            const container = document.getElementById('main-content');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('view-title').innerText = isEdit ? "Edit Menu" : "Buat Baru";
            document.getElementById('view-subtitle').innerText = "Konfigurasi";
            
            const currentURL = window.location.origin + window.location.pathname;
            const shareURL = `${currentURL}?view=${encodeURIComponent(state.tempOwnerName || '')}`;
            const editAppData = isEditingApp ? state.tempApps[state.editingTempAppIndex] : { name: '', url: '', icon: '' };

            container.innerHTML = `
                <div class="p-6 space-y-8 animate-fade-in pb-20">
                    <div class="space-y-2">
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Nama Pemilik</label>
                        <input type="text" id="owner-name" value="${state.tempOwnerName}" 
                            oninput="state.tempOwnerName = this.value; document.getElementById('share-url-input').value = '${currentURL}?view=' + encodeURIComponent(this.value)" 
                            placeholder="Masukan nama..." 
                            class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none font-bold text-slate-700">
                    </div>

                    <div class="p-4 bg-slate-900 rounded-3xl space-y-3">
                        <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Shareable Direct Link</label>
                        <div class="flex gap-2">
                            <input type="text" id="share-url-input" value="${shareURL}" readonly 
                                class="flex-1 bg-transparent text-white/40 text-[10px] outline-none font-mono truncate">
                            <button id="copy-btn" onclick="copyText('share-url-input')" class="text-indigo-400 p-1">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div class="${isEditingApp ? 'bg-amber-50 ring-1 ring-amber-200' : 'bg-indigo-50/50'} p-6 rounded-[2.5rem] space-y-4">
                        <h3 class="text-[10px] font-black ${isEditingApp ? 'text-amber-600' : 'text-indigo-600'} uppercase tracking-widest">
                            ${isEditingApp ? 'Edit Aplikasi' : 'Tambah Aplikasi Baru'}
                        </h3>
                        <div class="space-y-3">
                            <input type="text" id="new-app-name" value="${editAppData.name}" placeholder="Nama Aplikasi" class="w-full p-3.5 rounded-xl bg-white border-none outline-none text-sm font-semibold">
                            <input type="url" id="new-app-url" value="${editAppData.url}" placeholder="URL Tujuan" class="w-full p-3.5 rounded-xl bg-white border-none outline-none text-sm font-semibold">
                            <input type="url" id="new-app-icon" value="${editAppData.icon}" placeholder="URL Ikon (Google Drive ok)" class="w-full p-3.5 rounded-xl bg-white border-none outline-none text-sm font-semibold">
                        </div>
                        <div class="flex gap-2">
                            <button onclick="router.addToTempList()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl text-xs font-bold shadow-lg">
                                ${isEditingApp ? 'Update' : 'Tambahkan'}
                            </button>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Daftar Aplikasi (${state.tempApps.length})</label>
                        ${state.tempApps.map((app, i) => `
                            <div class="flex items-center gap-3 p-3 bg-white rounded-2xl border border-slate-50">
                                <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center overflow-hidden shrink-0">
                                    ${app.icon ? `<img src="${fixDriveUrl(app.icon)}" class="w-full h-full object-cover" onerror="handleImgError(this)">` : ''}
                                    <div class="img-fallback flex items-center justify-center w-full h-full"><i data-lucide="globe" class="w-4 h-4 text-slate-300"></i></div>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-xs font-bold text-slate-800 truncate">${app.name}</p>
                                </div>
                                <div class="flex">
                                    <button onclick="router.editTempApp(${i})" class="p-2 text-slate-300"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                    <button onclick="router.removeFromTemp(${i})" class="text-slate-300 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <button onclick="router.saveFinalMenu()" class="w-full bg-slate-900 text-white p-5 rounded-[2rem] font-bold shadow-2xl active:scale-95 transition-all">
                        ${isEdit ? 'Update Dashboard' : 'Simpan Dashboard'}
                    </button>
                </div>
            `;
            lucide.createIcons();
        };

        const renderView = (index) => {
            state.currentMenuIndex = index;
            const menu = state.menus[index];
            const container = document.getElementById('main-content');
            const header = document.getElementById('main-header');
            const bottomNav = document.getElementById('bottom-nav');
            
            bottomNav.style.transform = 'translateY(100%)';
            
            // Jika Mode Langsung (Direct Link), sembunyikan Header & Navigasi Murni
            if (state.isDirectMode) {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
                document.getElementById('back-btn-header').classList.add('hidden');
                document.getElementById('view-title').innerText = menu.owner;
                document.getElementById('view-subtitle').innerText = "DASHBOARD AKTIF";
            }

            container.innerHTML = `
                <div class="p-10 flex flex-col items-center min-h-full">
                    <!-- Title for Direct Mode -->
                    ${state.isDirectMode ? `
                        <div class="w-full mb-12 animate-fade-in">
                            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">${menu.owner}</h1>
                            <p class="text-[10px] text-indigo-500 uppercase tracking-[0.2em] font-bold mt-1">Dashboard Aktif</p>
                        </div>
                    ` : ''}

                    <div class="grid grid-cols-2 gap-x-12 gap-y-12 w-full animate-fade-in">
                        ${menu.apps.map((app, i) => `
                            <div onclick="router.openBrowser('${app.url}', '${app.name}')" class="flex flex-col items-center gap-4 cursor-pointer group">
                                <div class="w-full aspect-square bg-slate-50 app-icon-squircle flex items-center justify-center overflow-hidden relative">
                                    ${app.icon ? 
                                        `<img src="${fixDriveUrl(app.icon)}" referrerpolicy="no-referrer" class="w-full h-full object-cover absolute inset-0" onerror="handleImgError(this)">` : ''
                                    }
                                    <div class="img-fallback flex flex-col items-center justify-center w-full h-full ${app.icon ? 'hidden' : ''}">
                                        <i data-lucide="external-link" class="w-8 h-8 text-indigo-200"></i>
                                    </div>
                                </div>
                                <span class="font-bold text-sm text-slate-700 text-center tracking-tight">${app.name}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <!-- Tombol Kembali hanya muncul untuk Admin -->
                    ${!state.isDirectMode ? `
                        <div class="mt-24 mb-10 w-full flex justify-center animate-fade-in" style="animation-delay: 0.2s">
                             <button onclick="router.navigate('list')" class="kembali-btn px-10 py-4 text-slate-400 text-xs font-black uppercase tracking-[0.3em] rounded-3xl hover:bg-white transition-all flex items-center gap-3">
                                <i data-lucide="arrow-left" class="w-5 h-5"></i> KEMBALI
                             </button>
                        </div>
                    ` : ''}
                </div>
            `;
            lucide.createIcons();
        };

        const renderBrowser = (url, name) => {
            const container = document.getElementById('main-content');
            const header = document.getElementById('main-header');
            const backBtnHeader = document.getElementById('back-btn-header');
            
            // Tampilkan Header Minimal untuk Navigasi Browser
            header.classList.remove('hidden');
            backBtnHeader.classList.remove('hidden');
            document.getElementById('header-nav').classList.remove('hidden');
            
            // Sembunyikan Home button jika direct mode saat di dalam browser
            if (state.isDirectMode) {
                document.getElementById('home-btn').classList.add('hidden');
            }

            backBtnHeader.onclick = () => router.navigate('view', state.currentMenuIndex);
            
            document.getElementById('view-title').innerText = name;
            document.getElementById('view-subtitle').innerText = "Sedang Berjalan";

            container.className = "flex-1 overflow-hidden p-0 relative bg-white";
            container.innerHTML = `
                <div class="absolute top-4 right-4 z-40">
                    <a href="${url}" target="_blank" class="bg-white/90 backdrop-blur-md p-3 rounded-2xl shadow-xl border border-slate-100 flex items-center gap-2 text-[10px] font-bold text-indigo-600 active:scale-95 transition-all">
                        <i data-lucide="external-link" class="w-4 h-4"></i> TAB BARU
                    </a>
                </div>
                <iframe src="${url}" class="w-full h-full border-none"></iframe>
            `;
            lucide.createIcons();
        };

        const router = {
            navigate: (view, param) => {
                const content = document.getElementById('main-content');
                content.className = "flex-1 overflow-y-auto custom-scrollbar";
                state.currentView = view;
                if (view !== 'create') state.isInitialLoad = true;

                if (view === 'list') renderList();
                if (view === 'create') renderCreate(param !== undefined ? param : null);
                if (view === 'view') renderView(param);
                if (view === 'browser') renderBrowser(param.url, param.name);
                if (view === 'settings') {
                    document.getElementById('main-header').classList.remove('hidden');
                    document.getElementById('bottom-nav').style.transform = 'translateY(0)';
                    content.innerHTML = `<div class="p-8 text-center animate-fade-in"><button onclick="router.clearAll()" class="w-full p-5 bg-rose-50 text-rose-500 rounded-3xl text-[10px] font-black uppercase tracking-widest border border-rose-100">Hapus Semua Data Lokal</button></div>`;
                    lucide.createIcons();
                }
                window.scrollTo(0,0);
            },
            addToTempList: () => {
                const name = document.getElementById('new-app-name').value;
                const url = document.getElementById('new-app-url').value;
                const icon = document.getElementById('new-app-icon').value;
                if (!name || !url) return;
                const appObj = { name, url, icon };
                if (state.editingTempAppIndex !== null) {
                    state.tempApps[state.editingTempAppIndex] = appObj;
                    state.editingTempAppIndex = null;
                } else {
                    state.tempApps.push(appObj);
                }
                state.tempOwnerName = document.getElementById('owner-name').value;
                renderCreate(state.editingIndex);
            },
            editTempApp: (i) => {
                state.tempOwnerName = document.getElementById('owner-name').value;
                state.editingTempAppIndex = i;
                renderCreate(state.editingIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            removeFromTemp: (i) => {
                state.tempApps.splice(i, 1);
                renderCreate(state.editingIndex);
            },
            saveFinalMenu: () => {
                const owner = document.getElementById('owner-name').value;
                if (!owner || state.tempApps.length === 0) return alert("Data tidak lengkap!");
                if (state.editingIndex !== null) {
                    state.menus[state.editingIndex] = { owner, apps: [...state.tempApps] };
                } else {
                    state.menus.push({ owner, apps: [...state.tempApps] });
                }
                saveState();
                state.tempApps = []; state.tempOwnerName = ""; state.isInitialLoad = true;
                router.navigate('list');
            },
            openBrowser: (url, name) => router.navigate('browser', {url, name}),
            deleteMenu: (idx) => { if (confirm("Hapus?")) { state.menus.splice(idx, 1); saveState(); renderList(); } },
            clearAll: () => { if(confirm("Hapus semua data?")) { localStorage.clear(); location.reload(); } }
        };

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const viewName = urlParams.get('view');

            if (viewName) {
                const index = state.menus.findIndex(m => m.owner.toLowerCase() === viewName.toLowerCase());
                if (index !== -1) {
                    state.isDirectMode = true; // Kunci ke mode aplikasi personal
                    router.navigate('view', index);
                } else {
                    renderList();
                }
            } else {
                renderList();
            }
            
            document.getElementById('home-btn').onclick = () => {
                window.history.replaceState({}, document.title, window.location.pathname);
                router.navigate('list');
            };
        };
    </script>
</body>
</html>
