<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Dashboard Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-soft: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-soft);
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .app-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(99, 102, 241, 0.15);
        }

        .app-card:active {
            transform: scale(0.95);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex justify-center">

    <div id="app" class="w-full max-w-md min-h-screen bg-white relative overflow-hidden flex flex-col shadow-2xl">
        <!-- Modern Header -->
        <header id="main-header" class="px-6 py-5 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-slate-100">
            <div id="header-text">
                <h1 id="view-title" class="text-xl font-extrabold tracking-tight text-slate-900">Dashboard</h1>
                <p id="view-subtitle" class="text-[10px] text-indigo-500 uppercase tracking-[0.2em] font-bold">Personal Space</p>
            </div>
            <div class="flex gap-2">
                <button id="back-to-view" class="hidden p-2.5 bg-slate-50 text-slate-600 hover:bg-slate-100 rounded-2xl transition-all">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
                <button id="home-btn" class="p-2.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-2xl transition-all">
                    <i data-lucide="layout" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto custom-scrollbar">
            <!-- Konten dinamis akan dimuat di sini -->
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="bg-white/90 backdrop-blur-lg border-t border-slate-100 flex justify-around items-center px-6 py-4 sticky bottom-0 z-30 shrink-0">
            <button onclick="router.navigate('list')" class="nav-item flex flex-col items-center gap-1 group text-slate-400 transition-colors">
                <div class="p-2 rounded-xl group-hover:bg-slate-50">
                    <i data-lucide="grid-3x3" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-bold">KOLEKSI</span>
            </button>
            
            <button onclick="router.navigate('create')" class="relative -top-8 flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-3xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:scale-110 active:scale-95 transition-all">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>

            <button onclick="router.navigate('settings')" class="nav-item flex flex-col items-center gap-1 group text-slate-400 transition-colors">
                <div class="p-2 rounded-xl group-hover:bg-slate-50">
                    <i data-lucide="settings-2" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-bold">OPSI</span>
            </button>
        </nav>
    </div>

    <script>
        let state = {
            menus: JSON.parse(localStorage.getItem('custom_menus')) || [],
            currentView: 'list',
            editingIndex: null,
            tempApps: [],
            tempOwnerName: "",
            editingTempAppIndex: null,
            currentMenuIndex: null,
            isInitialLoad: true
        };

        const saveState = () => {
            localStorage.setItem('custom_menus', JSON.stringify(state.menus));
        };

        const fixDriveUrl = (url) => {
            if (!url) return "";
            try {
                const driveMatch = url.match(/\/file\/d\/([^\/\?]+)/) || url.match(/id=([^\&]+)/);
                if (driveMatch && (url.includes('drive.google.com') || url.includes('docs.google.com'))) {
                    return `https://drive.google.com/thumbnail?authuser=0&sz=w400&id=${driveMatch[1]}`;
                }
            } catch (e) { console.error(e); }
            return url;
        };

        window.handleImgError = (img) => {
            img.style.display = 'none';
            const fallback = img.nextElementSibling;
            if (fallback) fallback.classList.remove('hidden');
        };

        const copyText = (textId) => {
            const copyInput = document.getElementById(textId);
            copyInput.select();
            document.execCommand("copy");
            
            const btn = document.getElementById('copy-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-500"></i>';
            lucide.createIcons();
            setTimeout(() => { btn.innerHTML = originalHTML; lucide.createIcons(); }, 2000);
        };

        // UI RENDERERS
        const renderList = () => {
            const container = document.getElementById('main-content');
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('back-to-view').classList.add('hidden');
            document.getElementById('view-title').innerText = "Koleksi Dashboard";
            document.getElementById('view-subtitle').innerText = "Manage Your Assets";

            if (state.menus.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 px-10 text-center animate-fade-in">
                        <div class="w-24 h-24 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mb-6">
                            <i data-lucide="layout-template" class="w-10 h-10 text-slate-300"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800">Mulai Petualangan Anda</h3>
                        <p class="text-sm text-slate-400 mt-2">Buat dashboard kustom pertama Anda dengan menekan tombol plus di bawah.</p>
                    </div>
                `;
            } else {
                container.innerHTML = `
                <div class="p-6 space-y-4">
                    ${state.menus.map((menu, idx) => `
                        <div class="group bg-white rounded-3xl border border-slate-100 p-4 flex items-center gap-4 hover:border-indigo-100 hover:bg-indigo-50/30 transition-all animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                            <div onclick="router.navigate('view', ${idx})" class="flex flex-1 items-center gap-4 cursor-pointer">
                                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl overflow-hidden shadow-lg shadow-indigo-100">
                                    ${menu.apps[0]?.icon ? `<img src="${fixDriveUrl(menu.apps[0].icon)}" referrerpolicy="no-referrer" class="w-full h-full object-cover" onerror="handleImgError(this)">` : ''}
                                    <span class="img-fallback ${menu.apps[0]?.icon ? 'hidden' : ''}">${menu.owner.charAt(0).toUpperCase()}</span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-900 group-hover:text-indigo-600 transition-colors">${menu.owner}</h4>
                                    <div class="flex items-center gap-2 mt-0.5">
                                        <span class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full uppercase">${menu.apps.length} Apps</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="router.navigate('create', ${idx})" class="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-white rounded-xl transition-all">
                                    <i data-lucide="edit-2" class="w-5 h-5"></i>
                                </button>
                                <button onclick="router.deleteMenu(${idx})" class="p-2.5 text-slate-400 hover:text-rose-500 hover:bg-white rounded-xl transition-all">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }
            lucide.createIcons();
        };

        const renderCreate = (editIndex = null) => {
            if (state.isInitialLoad) {
                if (editIndex !== null) {
                    state.editingIndex = editIndex;
                    state.tempApps = [...state.menus[editIndex].apps];
                    state.tempOwnerName = state.menus[editIndex].owner;
                } else {
                    state.editingIndex = null;
                    state.tempApps = [];
                    state.tempOwnerName = "";
                }
                state.editingTempAppIndex = null;
                state.isInitialLoad = false;
            }

            const isEdit = state.editingIndex !== null;
            const isEditingApp = state.editingTempAppIndex !== null;
            const container = document.getElementById('main-content');
            document.getElementById('view-title').innerText = isEdit ? "Edit Space" : "New Space";
            document.getElementById('view-subtitle').innerText = "Customize Everything";
            
            const currentURL = window.location.origin + window.location.pathname;
            const shareURL = `${currentURL}?view=${encodeURIComponent(state.tempOwnerName || 'nama-anda')}`;
            const editAppData = isEditingApp ? state.tempApps[state.editingTempAppIndex] : { name: '', url: '', icon: '' };

            container.innerHTML = `
                <div class="p-6 space-y-8 animate-fade-in">
                    <!-- Basic Info -->
                    <section class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Nama Dashboard</label>
                            <input type="text" id="owner-name" value="${state.tempOwnerName}" 
                                oninput="state.tempOwnerName = this.value; document.getElementById('share-url-input').value = '${currentURL}?view=' + encodeURIComponent(this.value || 'nama-anda')" 
                                placeholder="Contoh: Project Alpha" 
                                class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white outline-none transition-all font-semibold">
                        </div>

                        <div class="p-4 bg-slate-900 rounded-3xl space-y-3">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Shareable Link</label>
                            <div class="flex gap-2">
                                <input type="text" id="share-url-input" value="${shareURL}" readonly 
                                    class="flex-1 bg-white/5 text-white/50 text-[11px] p-2 rounded-lg outline-none font-mono truncate">
                                <button id="copy-btn" onclick="copyText('share-url-input')" class="text-indigo-400 p-1">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </section>

                    <!-- Add App Form -->
                    <section class="${isEditingApp ? 'bg-amber-50 ring-2 ring-amber-100' : 'bg-white border-2 border-slate-100'} p-6 rounded-[2rem] space-y-4 transition-all">
                        <h3 class="text-xs font-black ${isEditingApp ? 'text-amber-600' : 'text-slate-800'} uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="${isEditingApp ? 'refresh-cw' : 'plus-circle'}" class="w-4 h-4"></i>
                            ${isEditingApp ? 'Update Aplikasi' : 'Tambah Aplikasi'}
                        </h3>
                        <div class="space-y-3">
                            <input type="text" id="new-app-name" value="${editAppData.name}" placeholder="Label Aplikasi" class="w-full p-3.5 rounded-xl bg-slate-50 border-none outline-none text-sm font-medium">
                            <input type="url" id="new-app-url" value="${editAppData.url}" placeholder="URL (https://...)" class="w-full p-3.5 rounded-xl bg-slate-50 border-none outline-none text-sm font-medium">
                            <input type="url" id="new-app-icon" value="${editAppData.icon}" placeholder="URL Ikon (Google Drive ok)" class="w-full p-3.5 rounded-xl bg-slate-50 border-none outline-none text-sm font-medium">
                        </div>
                        <div class="flex gap-2">
                             ${isEditingApp ? `
                                <button onclick="router.cancelEditApp()" class="flex-1 bg-white border border-slate-200 text-slate-600 p-3.5 rounded-xl text-xs font-bold">Batal</button>
                            ` : ''}
                            <button onclick="router.addToTempList()" class="flex-[2] ${isEditingApp ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'} text-white p-3.5 rounded-xl text-xs font-bold shadow-lg transition-all">
                                ${isEditingApp ? 'Update di Daftar' : 'Masukan ke Daftar'}
                            </button>
                        </div>
                    </section>

                    <!-- Apps Preview -->
                    <section class="space-y-3">
                        <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Urutan Aplikasi (${state.tempApps.length})</label>
                        <div class="space-y-2">
                            ${state.tempApps.length === 0 ? '<p class="text-xs text-slate-300 italic p-4 text-center">Belum ada aplikasi ditambahkan...</p>' : ''}
                            ${state.tempApps.map((app, i) => `
                                <div class="flex items-center gap-3 p-3 bg-white rounded-2xl border border-slate-100 ${state.editingTempAppIndex === i ? 'ring-2 ring-amber-400' : ''}">
                                    <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center overflow-hidden relative shrink-0">
                                        ${app.icon ? `<img src="${fixDriveUrl(app.icon)}" referrerpolicy="no-referrer" class="w-full h-full object-cover" onerror="handleImgError(this)">` : ''}
                                        <div class="img-fallback flex items-center justify-center w-full h-full"><i data-lucide="globe" class="w-4 h-4 text-slate-300"></i></div>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <p class="text-xs font-bold text-slate-800 truncate">${app.name}</p>
                                        <p class="text-[9px] text-slate-400 truncate">${app.url}</p>
                                    </div>
                                    <div class="flex items-center">
                                        <button onclick="router.editTempApp(${i})" class="p-2 text-slate-300 hover:text-indigo-600 transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                        <button onclick="router.removeFromTemp(${i})" class="p-2 text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>

                    <button onclick="router.saveFinalMenu()" class="w-full bg-slate-900 text-white p-5 rounded-[2rem] font-bold shadow-2xl hover:bg-black active:scale-95 transition-all">
                        ${isEdit ? 'Update Dashboard' : 'Selesaikan & Simpan'}
                    </button>
                </div>
            `;
            lucide.createIcons();
        };

        const renderView = (index) => {
            state.currentMenuIndex = index;
            const menu = state.menus[index];
            const container = document.getElementById('main-content');
            document.getElementById('bottom-nav').classList.add('hidden');
            document.getElementById('back-to-view').classList.add('hidden');
            document.getElementById('view-title').innerText = menu.owner;
            document.getElementById('view-subtitle').innerText = "Dashboard Aktif";

            container.innerHTML = `
                <div class="p-6">
                    <div class="grid grid-cols-3 gap-6 animate-fade-in">
                        ${menu.apps.map((app, i) => `
                            <div onclick="router.openBrowser('${app.url}', '${app.name}')" class="app-card flex flex-col items-center gap-3 cursor-pointer">
                                <div class="w-full aspect-square bg-white rounded-[2rem] border border-slate-50 shadow-sm flex items-center justify-center overflow-hidden relative active:scale-90 transition-transform">
                                    ${app.icon ? 
                                        `<img src="${fixDriveUrl(app.icon)}" referrerpolicy="no-referrer" class="w-full h-full object-cover absolute inset-0" onerror="handleImgError(this)">` : ''
                                    }
                                    <div class="img-fallback flex flex-col items-center justify-center w-full h-full bg-indigo-50/50 ${app.icon ? 'hidden' : ''}">
                                        <i data-lucide="external-link" class="w-6 h-6 text-indigo-400"></i>
                                    </div>
                                </div>
                                <span class="font-bold text-[11px] text-slate-700 text-center line-clamp-1 w-full px-1">${app.name}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-12 flex justify-center">
                         <button onclick="router.navigate('list')" class="px-6 py-3 bg-slate-50 text-slate-400 text-[11px] font-black uppercase tracking-widest rounded-2xl hover:bg-slate-100 transition-all flex items-center gap-2">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
                         </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        };

        const renderBrowser = (url, name) => {
            const container = document.getElementById('main-content');
            const backBtn = document.getElementById('back-to-view');
            const bottomNav = document.getElementById('bottom-nav');

            bottomNav.classList.add('hidden');
            backBtn.classList.remove('hidden');
            backBtn.onclick = () => router.navigate('view', state.currentMenuIndex);
            
            document.getElementById('view-title').innerText = name;
            document.getElementById('view-subtitle').innerText = "App View";

            container.className = "flex-1 overflow-hidden p-0 relative bg-white";
            container.innerHTML = `
                <div class="absolute top-4 right-4 z-40">
                    <a href="${url}" target="_blank" class="bg-white/90 backdrop-blur-md p-3 rounded-2xl shadow-xl border border-slate-100 flex items-center gap-2 text-[11px] font-bold text-indigo-600 active:scale-95 transition-all">
                        <i data-lucide="external-link" class="w-4 h-4"></i> OPEN TAB
                    </a>
                </div>
                <div class="browser-container h-full w-full">
                    <iframe src="${url}" id="site-frame" class="w-full h-full"></iframe>
                </div>
            `;
            lucide.createIcons();
        };

        // ROUTER SYSTEM
        const router = {
            navigate: (view, param) => {
                const content = document.getElementById('main-content');
                content.className = "flex-1 overflow-y-auto custom-scrollbar";
                state.currentView = view;
                
                if (view !== 'create') state.isInitialLoad = true;

                if (view === 'list') renderList();
                if (view === 'create') renderCreate(param !== undefined ? param : null);
                if (view === 'view') renderView(param);
                if (view === 'browser') renderBrowser(param.url, param.name);
                if (view === 'settings') {
                    document.getElementById('bottom-nav').classList.remove('hidden');
                    content.innerHTML = `
                        <div class="p-6 space-y-6 animate-fade-in">
                            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm text-center">
                                <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide="shield-alert" class="w-8 h-8"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800">Zona Berbahaya</h3>
                                <p class="text-sm text-slate-400 mt-2 mb-8">Menghapus data akan menghilangkan seluruh koleksi dashboard yang telah Anda buat.</p>
                                <button onclick="router.clearAll()" class="w-full p-4 bg-rose-500 text-white rounded-2xl text-xs font-extrabold uppercase tracking-widest shadow-lg shadow-rose-100 hover:bg-rose-600 transition-all">
                                    Hapus Semua Data
                                </button>
                            </div>
                            <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-widest">Dashboard v2.0 • Pro Edition</p>
                        </div>`;
                    lucide.createIcons();
                }
                window.scrollTo(0,0);
            },
            addToTempList: () => {
                const nameInp = document.getElementById('new-app-name');
                const urlInp = document.getElementById('new-app-url');
                const iconInp = document.getElementById('new-app-icon');
                if (!nameInp.value || !urlInp.value) return;
                
                const appObj = { name: nameInp.value, url: urlInp.value, icon: iconInp.value };
                if (state.editingTempAppIndex !== null) {
                    state.tempApps[state.editingTempAppIndex] = appObj;
                    state.editingTempAppIndex = null;
                } else {
                    state.tempApps.push(appObj);
                }
                state.tempOwnerName = document.getElementById('owner-name').value;
                renderCreate(state.editingIndex);
            },
            editTempApp: (i) => {
                state.tempOwnerName = document.getElementById('owner-name').value;
                state.editingTempAppIndex = i;
                renderCreate(state.editingIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            cancelEditApp: () => {
                state.editingTempAppIndex = null;
                renderCreate(state.editingIndex);
            },
            removeFromTemp: (i) => {
                if (state.editingTempAppIndex === i) state.editingTempAppIndex = null;
                state.tempOwnerName = document.getElementById('owner-name').value;
                state.tempApps.splice(i, 1);
                renderCreate(state.editingIndex);
            },
            saveFinalMenu: () => {
                const owner = document.getElementById('owner-name').value;
                if (!owner || state.tempApps.length === 0) return alert("Lengkapi nama dan daftar aplikasi!");
                if (state.editingIndex !== null) {
                    state.menus[state.editingIndex] = { owner, apps: [...state.tempApps] };
                } else {
                    state.menus.push({ owner, apps: [...state.tempApps] });
                }
                saveState();
                state.tempApps = [];
                state.tempOwnerName = "";
                state.isInitialLoad = true;
                router.navigate('list');
            },
            openBrowser: (url, name) => {
                router.navigate('browser', {url, name});
            },
            deleteMenu: (index) => {
                if (confirm("Hapus dashboard ini?")) {
                    state.menus.splice(index, 1);
                    saveState();
                    renderList();
                }
            },
            clearAll: () => {
                if(confirm("Hapus semua?")) {
                    localStorage.removeItem('custom_menus');
                    state.menus = [];
                    router.navigate('list');
                }
            }
        };

        window.onload = () => {
            lucide.createIcons();
            renderList();
            document.getElementById('home-btn').onclick = () => router.navigate('list');
        };
    </script>
</body>
</html>
