<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecrew-Crew Room</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: #0f172a;
            color: #f8fafc;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        .page-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .view-hidden {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }
        
        .view-active {
            display: block;
            opacity: 1;
            transform: translateX(0);
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .menu-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            border-color: #06b6d4;
        }
        
        .canva-button {
            background-color: #06b6d4;
            color: white;
        }
        .canva-button:hover {
            background-color: #0891b2;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
            border-radius: 1rem;
            background: white;
        }

        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            background: linear-gradient(90deg, rgba(6,182,212,0.1) 0%, rgba(15,23,42,0) 50%, rgba(6,182,212,0.1) 100%);
            border-top: 1px solid rgba(6,182,212,0.2);
            border-bottom: 1px solid rgba(6,182,212,0.2);
            padding: 10px 0;
        }

        .marquee-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            color: #22d3ee;
            text-transform: uppercase;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        #sync-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>
 </head>
 <body class="min-h-screen pb-10">
  
  <!-- Sync Status -->
  <div id="sync-indicator" class="hidden">
      <div class="flex items-center gap-2 bg-slate-800 border border-slate-700 px-4 py-2 rounded-full shadow-2xl text-xs font-bold">
          <i data-lucide="refresh-cw" class="animate-spin text-cyan-400" style="width:14px;height:14px"></i>
          <span id="sync-text" class="text-slate-300">Menyinkronkan Data...</span>
      </div>
  </div>

  <!-- Preview Modal -->
  <div id="preview-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-slate-900/95 backdrop-blur-md">
    <div class="w-full h-full max-w-6xl flex flex-col p-6 animate-in fade-in zoom-in duration-300">
        <div class="flex items-center justify-between mb-4 bg-slate-800 p-4 rounded-2xl border border-slate-700">
            <div class="flex items-center gap-3">
                <i data-lucide="eye" class="text-cyan-400"></i>
                <h3 id="preview-user-title" class="font-bold text-white">Mode Pratinjau</h3>
            </div>
            <button onclick="closePreview()" class="p-2 bg-red-500/20 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-all"><i data-lucide="x"></i></button>
        </div>
        <div id="preview-body" class="flex-1 bg-slate-900 rounded-3xl border border-slate-700 overflow-y-auto p-6"></div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/95 backdrop-blur-md">
    <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 w-full max-w-md shadow-2xl scale-95 transition-transform duration-300" id="login-box">
        <div class="flex justify-center mb-6"><i data-lucide="lock" class="text-cyan-400" style="width:40px;height:40px"></i></div>
        <h3 class="text-2xl font-bold mb-6 text-center text-white">Login Manajemen</h3>
        <form onsubmit="performLogin(event)" class="space-y-4">
            <input id="login-user" type="text" required class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none" placeholder="Username">
            <input id="login-pass" type="password" required class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none" placeholder="Password">
            <div id="login-error" class="text-red-400 text-sm hidden">Autentikasi gagal.</div>
            <div class="flex gap-3 pt-4">
                <button type="submit" class="w-full canva-button py-3 rounded-xl font-bold">Masuk</button>
                <button type="button" onclick="closeLogin()" class="w-full bg-slate-700 py-3 rounded-xl font-bold text-white">Batal</button>
            </div>
        </form>
    </div>
  </div>

  <div id="greeting-marquee" class="marquee-container hidden"><div id="marquee-content" class="marquee-text"></div></div>

  <header id="main-header" class="relative overflow-hidden h-64 flex items-center bg-slate-900">
   <div class="absolute inset-0 bg-gradient-to-br from-slate-900/95 via-slate-900/80 to-slate-800/60 z-10"></div>
   <img id="header-logo" src="https://lh3.googleusercontent.com/d/1fiFem6YYOVqy1rD9F9aCTHgqHpIK2__c" alt="Logo" class="absolute inset-0 w-full h-full object-cover" />
   <div class="relative z-20 px-6 max-w-6xl mx-auto w-full flex justify-between items-center">
    <div>
        <h1 class="text-4xl font-extrabold tracking-tight text-white">Ecrew Room</h1>
        <p class="mt-2 opacity-80 text-lg font-light text-cyan-400">Navigasi cerdas untuk kru profesional.</p>
    </div>
    <div id="auth-controls"></div>
   </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <!-- View 1: Admin Panel -->
    <div id="view-admin" class="hidden page-transition space-y-10">
        <div class="flex items-center justify-between">
            <h2 class="text-2xl font-bold flex items-center gap-3 text-white"><i data-lucide="settings" class="text-cyan-400"></i> Management Center</h2>
            <div class="flex gap-3">
                <button onclick="toggleCrewForm()" class="canva-button px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all"><i data-lucide="user-plus"></i> Kelola Crew</button>
                <button onclick="toggleForm()" class="bg-slate-700 px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 text-white"><i data-lucide="plus"></i> Tambah Menu</button>
            </div>
        </div>

        <div id="crew-management-panel" class="hidden grid grid-cols-1 xl:grid-cols-2 gap-8">
            <div class="p-8 rounded-3xl border border-slate-700 bg-slate-800/40">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-white">Database Crew</h3>
                    <button onclick="toggleCrewForm()" class="text-slate-400 hover:text-white"><i data-lucide="x" style="width:20px"></i></button>
                </div>
                <form class="grid grid-cols-2 gap-4 mb-6" onsubmit="handleCrewSubmit(event)">
                    <input id="crew-name" type="text" required class="px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none" placeholder="Nama">
                    <select id="crew-rank" class="px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none">
                        <option value="Capt">Capt</option><option value="FO">FO</option><option value="Engineer">Engineer</option><option value="HLO">HLO</option><option value="FOO">FOO</option><option value="Cs">Cs</option>
                    </select>
                    <div class="col-span-2 flex gap-3">
                        <button type="submit" class="w-full bg-cyan-600 py-3 rounded-xl font-bold text-white hover:bg-cyan-500 transition-all">Simpan Crew</button>
                        <button type="button" onclick="toggleCrewForm()" class="w-full bg-slate-700 py-3 rounded-xl font-bold text-white hover:bg-slate-600 transition-all">Batal</button>
                    </div>
                </form>
                <div id="crew-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2"></div>
            </div>
            <div class="p-8 rounded-3xl border border-slate-700 bg-slate-800/40">
                <h3 class="text-xl font-bold text-white mb-6">Daftar Link Personal</h3>
                <div id="links-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="p-8 rounded-3xl border border-slate-700 bg-slate-800/40">
            <h3 class="text-xl font-bold text-white mb-6">Master Daftar Menu</h3>
            <div id="menu-form" class="hidden mb-10 p-6 bg-slate-900/50 rounded-2xl border border-slate-700">
                <form id="add-form" class="grid grid-cols-1 md:grid-cols-2 gap-6" onsubmit="handleSubmit(event)">
                    <input type="hidden" id="edit-id">
                    <div class="space-y-4">
                        <input id="menu-name" type="text" required class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none" placeholder="Nama Menu">
                        <input id="menu-url" type="url" class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none" placeholder="URL Link">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="menu-parent" class="px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none"></select>
                            <select id="menu-visibility" class="px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none"></select>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <input id="menu-image" type="url" class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none" placeholder="URL Gambar">
                        <div id="image-preview" class="h-24 rounded-xl border border-dashed border-slate-700 flex items-center justify-center bg-slate-900/30 overflow-hidden">
                            <img id="preview-img" class="w-full h-full object-cover hidden">
                            <span id="preview-placeholder" class="text-slate-500 text-xs">Pratinjau</span>
                        </div>
                    </div>
                    <div class="md:col-span-2 flex justify-end gap-3">
                        <button type="button" class="bg-slate-700 px-6 py-2.5 rounded-xl font-bold text-white" onclick="toggleForm()">Batal</button>
                        <button type="submit" class="canva-button px-8 py-2.5 rounded-xl font-bold">Simpan</button>
                    </div>
                </form>
            </div>
            <div id="admin-menu-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- View 2: Dashboard -->
    <div id="view-dashboard" class="page-transition view-active space-y-10">
        <h2 class="text-2xl font-bold flex items-center gap-3 text-white"><i data-lucide="compass" class="text-cyan-400"></i> Navigasi Dashboard</h2>
        <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <!-- View 3: Detail -->
    <div id="view-detail" class="page-transition view-hidden">
        <button onclick="navigateTo('grid')" class="flex items-center gap-2 text-slate-400 hover:text-cyan-400 transition-colors mb-8 font-bold"><i data-lucide="arrow-left"></i> Kembali</button>
        <div id="sub-menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <!-- View 4: Iframe -->
    <div id="view-iframe" class="page-transition view-hidden">
        <div class="flex items-center justify-between mb-6 p-4 bg-slate-800 rounded-2xl border border-slate-700">
            <div class="flex gap-4">
                <button onclick="navigateTo('grid')" class="bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold text-white flex items-center gap-2"><i data-lucide="layout-dashboard" style="width:16px"></i> Dashboard</button>
                <button onclick="handleIframeBack()" class="bg-cyan-600 px-4 py-2 rounded-lg text-sm font-bold text-white flex items-center gap-2"><i data-lucide="chevron-left" style="width:16px"></i> Kembali</button>
            </div>
            <span id="iframe-url-display" class="text-xs text-slate-500 truncate max-w-xs"></span>
        </div>
        <iframe id="app-iframe" class="iframe-container" src="about:blank"></iframe>
    </div>
  </main>

  <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrqKE8YOdskGUi6A4uG7g3v8paQ7Gn0qYDvClX6UL8L8h8R4sRZPe91bcwo2TuglFf/exec"; 

        let allData = JSON.parse(localStorage.getItem('ecrew_menus')) || [];
        let allCrew = JSON.parse(localStorage.getItem('ecrew_members')) || [];
        let allLinks = JSON.parse(localStorage.getItem('ecrew_personalized_links')) || [];
        let isAdmin = false;
        let activeCid = new URLSearchParams(window.location.search).get('cid');
        let lastParentId = null;

        // SYNC FUNCTIONS (IMPROVED FOR MOBILE)
        async function syncData(type, payload) {
            if (!SCRIPT_URL) return;
            showSync(true, "Sinkronisasi Berjalan...");
            try {
                // Gunakan fetch standar tanpa no-cors untuk gas (karena kita butuh konfirmasi kirim)
                // Namun GAS butuh mode: 'no-cors' jika tidak ingin berurusan dengan pre-flight OPTIONS
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, payload })
                });
            } catch (e) { 
                console.error("Sinkronisasi gagal", e); 
                alert("Koneksi bermasalah. Data akan tersimpan di ponsel ini saja sementara waktu.");
            }
            finally { 
                setTimeout(() => showSync(false), 1500); 
            }
        }

        async function loadFromSheets() {
            if (!SCRIPT_URL) return;
            showSync(true, "Memuat Data...");
            try {
                // Cache-busting dengan timestamp agar ponsel selalu ambil data terbaru
                const cacheBuster = "?t=" + Date.now();
                const response = await fetch(SCRIPT_URL + cacheBuster);
                const data = await response.json();
                
                if (data.menus) { allData = data.menus; localStorage.setItem('ecrew_menus', JSON.stringify(allData)); }
                if (data.crew) { allCrew = data.crew; localStorage.setItem('ecrew_members', JSON.stringify(allCrew)); }
                if (data.links) { allLinks = data.links; localStorage.setItem('ecrew_personalized_links', JSON.stringify(allLinks)); }
                
                renderUIOnLoad();
            } catch (e) { 
                console.error("Gagal memuat data dari cloud", e);
                // Gunakan data lokal jika gagal
                renderUIOnLoad();
            }
            finally { 
                showSync(false); 
            }
        }

        function showSync(show, text = "Sinkronisasi...") {
            const el = document.getElementById('sync-indicator');
            const txt = document.getElementById('sync-text');
            if(txt) txt.textContent = text;
            if(el) el.classList.toggle('hidden', !show);
        }

        // NAVIGATION
        function navigateTo(view, parentId = null, url = null) {
            const vMap = { 'admin': 'view-admin', 'grid': 'view-dashboard', 'detail': 'view-detail', 'iframe': 'view-iframe' };
            const mainHeader = document.getElementById('main-header');
            
            Object.values(vMap).forEach(vId => {
                const v = document.getElementById(vId);
                if(v) {
                    v.classList.add('view-hidden');
                    v.classList.add('hidden');
                }
            });

            if(mainHeader) mainHeader.classList.toggle('hidden', view === 'iframe');
            const t = document.getElementById(vMap[view]);
            if(t) {
                t.classList.remove('hidden');
                t.classList.remove('view-hidden');
                t.classList.add('view-active');
            }
            
            if (view === 'grid') renderMenus();
            if (view === 'detail') renderDetailView(parentId);
            if (view === 'iframe') { 
                const iframe = document.getElementById('app-iframe');
                const display = document.getElementById('iframe-url-display');
                if(iframe) iframe.src = url; 
                if(display) display.textContent = url; 
            }
            if (view === 'admin') renderAdminUI();
            
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleIframeBack() {
            if (lastParentId) navigateTo('detail', lastParentId);
            else navigateTo('grid');
        }

        function openLogin() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('login-modal').classList.add('hidden'); }
        
        function performLogin(e) {
            e.preventDefault();
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if (u === 'admin' && p === 'TWA119-021') {
                isAdmin = true; 
                closeLogin(); 
                navigateTo('admin');
                renderAuthControls();
            } else { 
                document.getElementById('login-error').classList.remove('hidden'); 
            }
        }
        
        function logout() { 
            isAdmin = false; 
            renderAuthControls(); 
            navigateTo('grid'); 
        }

        function renderAdminUI() {
            renderAuthControls();
            renderCrewList();
            renderLinksList();
            renderAdminMenuList();
            updateParentDropdown();
            updateVisibilityDropdown();
            lucide.createIcons();
        }

        function renderAuthControls() {
            const c = document.getElementById('auth-controls');
            if(!c) return;
            c.innerHTML = isAdmin ? `<button onclick="logout()" class="bg-red-500/10 hover:bg-red-500 border border-red-500/50 px-4 py-2 rounded-xl font-bold text-red-400 hover:text-white transition-all flex items-center gap-2"><i data-lucide="log-out" style="width:18px"></i> Tutup</button>` 
                                  : `<button onclick="openLogin()" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl text-white hover:bg-slate-700 transition-all"><i data-lucide="lock" class="text-cyan-400"></i></button>`;
            lucide.createIcons();
        }

        // OTHER FUNCTIONS REMAINS THE SAME BUT ENSURE LOCALSTORAGE & SYNC
        function handleCrewSubmit(e) {
            e.preventDefault();
            const c = { id: Date.now().toString(), name: document.getElementById('crew-name').value.trim(), rank: document.getElementById('crew-rank').value };
            allCrew.push(c);
            localStorage.setItem('ecrew_members', JSON.stringify(allCrew));
            syncData('crew', allCrew);
            document.getElementById('crew-name').value = '';
            renderCrewList();
        }

        function renderCrewList() {
            const l = document.getElementById('crew-list');
            if(!l) return;
            l.innerHTML = allCrew.map(c => `
                <div class="flex items-center justify-between p-3 bg-slate-900/50 border border-slate-700 rounded-xl">
                    <p class="text-white text-sm font-bold">${c.rank}. ${c.name}</p>
                    <div class="flex gap-1">
                        <button onclick="generateLinkForCrew('${c.id}')" class="p-2 text-cyan-400"><i data-lucide="link" style="width:14px"></i></button>
                        <button onclick="deleteCrew('${c.id}')" class="p-2 text-red-400"><i data-lucide="trash-2" style="width:14px"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function generateLinkForCrew(cid) {
            const c = allCrew.find(i => i.id === cid);
            const n = `${c.rank}. ${c.name}`;
            const id = Math.random().toString(36).substring(2, 9);
            const url = window.location.origin + window.location.pathname + "?cid=" + id;
            allLinks.push({ id, name: n, url });
            localStorage.setItem('ecrew_personalized_links', JSON.stringify(allLinks));
            syncData('links', allLinks);
            renderLinksList();
        }

        function renderLinksList() {
            const l = document.getElementById('links-list');
            if(!l) return;
            l.innerHTML = allLinks.map(i => `
                <div class="flex items-center justify-between p-4 bg-slate-900 border border-slate-700 rounded-2xl">
                    <div class="overflow-hidden"><p class="text-white font-bold text-sm truncate">${i.name}</p></div>
                    <div class="flex gap-2">
                        <button onclick="showPersonalPreview('${i.id}')" class="p-2 text-indigo-400"><i data-lucide="eye" style="width:16px"></i></button>
                        <button onclick="copyToClipboard('${i.url}')" class="p-2 text-cyan-400"><i data-lucide="copy" style="width:16px"></i></button>
                        <button onclick="deleteLink('${i.id}')" class="p-2 text-red-400"><i data-lucide="trash-2" style="width:16px"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderAdminMenuList() {
            const l = document.getElementById('admin-menu-list');
            if(!l) return;
            const mains = allData.filter(d => !d.parent_id);
            l.innerHTML = mains.map(m => `
                <div class="flex items-center justify-between p-4 bg-slate-800/60 border border-slate-700 rounded-2xl">
                    <div class="flex items-center gap-4">
                        ${m.image ? `<img src="${m.image}" class="w-10 h-10 rounded-lg object-cover">` : `<div class="w-10 h-10 bg-slate-900 rounded-lg"></div>`}
                        <p class="text-white font-bold">${m.name} <span class="text-[10px] text-slate-500 uppercase">${m.visibility === 'all' ? 'Publik' : 'Privat'}</span></p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleForm(${JSON.stringify(m).replace(/"/g, '&quot;')})" class="p-2 text-slate-400 hover:text-cyan-400"><i data-lucide="edit-3" style="width:16px"></i></button>
                        <button onclick="deleteItem('${m.id}')" class="p-2 text-slate-400 hover:text-red-400"><i data-lucide="trash-2" style="width:16px"></i></button>
                    </div>
                </div>
            `).join('') || '<p class="text-center py-10 text-slate-600 italic">Daftar menu kosong.</p>';
            lucide.createIcons();
        }

        function renderMenus() {
            const grid = document.getElementById('menu-grid');
            if(!grid) return;
            let mains = allData.filter(d => !d.parent_id);
            if (activeCid) mains = mains.filter(m => m.visibility === 'all' || m.visibility === activeCid);
            grid.innerHTML = mains.map(m => `
                <div class="menu-card group rounded-2xl overflow-hidden bg-slate-800 border border-slate-700 flex flex-col cursor-pointer" onclick="handleMenuClick('${m.id}')">
                    <div class="h-48 w-full overflow-hidden border-b border-slate-700/50">
                        ${m.image ? `<img src="${m.image}" class="w-full h-full object-cover group-hover:scale-110 duration-500">` : `<div class="w-full h-full bg-slate-900"></div>`}
                    </div>
                    <div class="p-6 text-center text-white font-bold text-xl uppercase tracking-widest">${m.name}</div>
                </div>
            `).join('');
            renderGreeting();
            lucide.createIcons();
        }

        function handleMenuClick(id) {
            const subs = allData.filter(d => d.parent_id === id);
            const menu = allData.find(m => m.id === id);
            if (subs.length > 0) navigateTo('detail', id);
            else if (menu?.url) navigateTo('iframe', id, menu.url);
        }

        function renderDetailView(pid) {
            const subs = allData.filter(d => d.parent_id === pid);
            const grid = document.getElementById('sub-menu-grid');
            if(grid) {
                grid.innerHTML = subs.map(s => `
                    <div class="menu-card rounded-2xl overflow-hidden bg-slate-800 border border-slate-700 p-6 text-center cursor-pointer font-bold text-white uppercase" onclick="navigateTo('iframe', '${pid}', '${s.url}')">
                        ${s.name}
                    </div>
                `).join('');
            }
            lastParentId = pid;
            lucide.createIcons();
        }

        function renderGreeting() {
            const m = document.getElementById('greeting-marquee');
            const c = document.getElementById('marquee-content');
            if(!m || !c) return;
            let t = "";
            if (activeCid) {
                const l = allLinks.find(i => i.id === activeCid);
                if (l) t = `Selamat Datang ${l.name} — Dashboard Personal Aktif. Selamat Bertugas!`;
            } else if (allCrew.length > 0) {
                const l = allCrew[allCrew.length - 1];
                t = `Selamat Datang ${l.rank}. ${l.name} — Have a safe flight!`;
            }
            if (t && !isAdmin) { c.textContent = t; m.classList.remove('hidden'); }
            else { m.classList.add('hidden'); }
        }

        function showPersonalPreview(cid) {
            const linkObj = allLinks.find(l => l.id === cid);
            if (!linkObj) return;
            const b = document.getElementById('preview-body');
            const title = document.getElementById('preview-user-title');
            if(title) title.textContent = `Pratinjau: ${linkObj.name}`;
            const fMains = allData.filter(m => !m.parent_id && (m.visibility === 'all' || m.visibility === cid));
            if(b) {
                b.innerHTML = `
                    <div class="marquee-container mb-6 rounded-xl"><div class="marquee-text">Selamat Datang ${linkObj.name} — Mode Pratinjau Dashboard Personal Aktif.</div></div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${fMains.map(m => `<div class="bg-slate-800 p-6 rounded-2xl text-center border border-slate-700 font-bold uppercase text-white">${m.name}</div>`).join('')}
                    </div>
                `;
            }
            document.getElementById('preview-modal').classList.remove('hidden');
            lucide.createIcons();
        }
        function closePreview() { document.getElementById('preview-modal').classList.add('hidden'); }

        function toggleForm(data = null) {
            const f = document.getElementById('menu-form');
            if(!f) return;
            if (data) {
                f.classList.remove('hidden');
                document.getElementById('edit-id').value = data.id;
                document.getElementById('menu-name').value = data.name;
                document.getElementById('menu-url').value = data.url || '';
                document.getElementById('menu-image').value = data.image || '';
                document.getElementById('menu-parent').value = data.parent_id || '';
                document.getElementById('menu-visibility').value = data.visibility || 'all';
            } else {
                f.classList.toggle('hidden');
                document.getElementById('add-form').reset();
                document.getElementById('edit-id').value = '';
            }
        }

        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const newItem = {
                id: id || Date.now().toString(),
                name: document.getElementById('menu-name').value.trim(),
                url: document.getElementById('menu-url').value.trim(),
                parent_id: document.getElementById('menu-parent').value,
                visibility: document.getElementById('menu-visibility').value,
                image: convertGoogleDriveUrl(document.getElementById('menu-image').value.trim())
            };
            if (id) {
                const idx = allData.findIndex(d => d.id === id);
                if(idx !== -1) allData[idx] = newItem;
            } else { allData.push(newItem); }
            localStorage.setItem('ecrew_menus', JSON.stringify(allData));
            syncData('menus', allData);
            toggleForm(); renderAdminUI();
        }

        function deleteItem(id) { if(confirm('Hapus?')) { allData = allData.filter(d => d.id !== id && d.parent_id !== id); localStorage.setItem('ecrew_menus', JSON.stringify(allData)); syncData('menus', allData); renderAdminUI(); } }
        function deleteCrew(id) { if(confirm('Hapus?')) { allCrew = allCrew.filter(c => c.id !== id); localStorage.setItem('ecrew_members', JSON.stringify(allCrew)); syncData('crew', allCrew); renderCrewList(); } }
        function deleteLink(id) { if(confirm('Hapus?')) { allLinks = allLinks.filter(l => l.id !== id); localStorage.setItem('ecrew_personalized_links', JSON.stringify(allLinks)); syncData('links', allLinks); renderLinksList(); } }
        function copyToClipboard(t) { 
            const e = document.createElement('textarea'); 
            e.value = t; 
            document.body.appendChild(e); 
            e.select(); 
            document.execCommand('copy'); 
            document.body.removeChild(e); 
            alert('Tautan disalin!'); 
        }
        function convertGoogleDriveUrl(u) { const m = u.match(/\/d\/([a-zA-Z0-9-_]+)/); return m ? `https://lh3.googleusercontent.com/d/${m[1]}` : u; }
        function toggleCrewForm() { document.getElementById('crew-management-panel').classList.toggle('hidden'); }
        function updateParentDropdown() {
            const s = document.getElementById('menu-parent');
            if(s) s.innerHTML = '<option value="">— Menu Utama —</option>' + allData.filter(d => !d.parent_id).map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }
        function updateVisibilityDropdown() {
            const s = document.getElementById('menu-visibility');
            if(s) s.innerHTML = '<option value="all">Semua Crew</option>' + allLinks.map(l => `<option value="${l.id}">Khusus: ${l.name}</option>`).join('');
        }
        
        function renderUIOnLoad() { 
            renderAuthControls();
            renderMenus(); 
            if(isAdmin) renderAdminUI(); 
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderAuthControls();
            loadFromSheets(); // Akan memanggil renderUIOnLoad setelah fetch
        });
    </script>
 </body>
</html>
