<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Custom Dashboard Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --secondary: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfd;
            overscroll-behavior: none;
            margin: 0;
            padding: 0;
        }

        /* Glassmorphism Effect */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Squircle Icon Style */
        .squircle {
            border-radius: 24%;
            box-shadow: 0 8px 20px -4px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .squircle:active {
            transform: scale(0.9);
        }

        /* Direct Mode Background - Full Screen Gradient */
        .direct-bg {
            background: radial-gradient(circle at top right, #f5f3ff 0%, #ffffff 50%),
                        radial-gradient(circle at bottom left, #eff6ff 0%, #ffffff 50%);
            background-attachment: fixed;
        }

        /* Animation */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Hide scrollbar but keep functionality */
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        
        iframe { 
            height: 100%; 
            width: 100%; 
            border: none; 
        }

        /* Checkbox Switch Styling */
        input:checked + .checkbox-bg { background-color: var(--primary); }

        /* Ensure content doesn't get cut off on long phones */
        #app {
            min-height: 100vh;
            min-height: 100dvh;
        }
    </style>
</head>
<body class="min-h-screen flex justify-center selection:bg-indigo-100">

    <div id="app" class="w-full max-w-md min-h-screen bg-white relative overflow-hidden flex flex-col shadow-[0_0_50px_-12px_rgba(0,0,0,0.1)] transition-colors duration-500">
        
        <!-- Header (Sembunyi otomatis di Direct Mode dashboard) -->
        <header id="main-header" class="px-6 py-6 flex justify-between items-center bg-white/80 sticky top-0 z-40 shrink-0">
            <div id="header-text">
                <h1 id="view-title" class="text-2xl font-extrabold tracking-tight text-slate-900 leading-none">Dashboard</h1>
                <p id="view-subtitle" class="text-[10px] text-indigo-500 uppercase tracking-[0.2em] font-bold mt-1.5">Creator Studio</p>
            </div>
            <div class="flex gap-2" id="header-nav">
                <button id="back-btn-header" class="hidden p-2.5 bg-slate-100 text-slate-600 rounded-2xl active:scale-90 transition-all">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <button id="home-btn" class="p-2.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-2xl active:scale-90 transition-all">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col">
            <!-- Konten dinamis akan dimuat di sini -->
        </main>

        <!-- Bottom Navigation (Hanya untuk Admin) -->
        <nav id="bottom-nav" class="glass-nav border-t border-slate-50 flex justify-around items-center px-6 py-4 sticky bottom-0 z-40 shrink-0 transition-transform duration-500">
            <button onclick="router.navigate('list')" class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-600 transition-colors">
                <i data-lucide="grid" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Daftar</span>
            </button>
            
            <button onclick="router.navigate('create')" class="relative -top-8 flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-[2rem] shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:scale-110 active:scale-95 transition-all">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </button>

            <button onclick="router.navigate('settings')" class="flex flex-col items-center gap-1.5 text-slate-400 hover:text-indigo-600 transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest">Opsi</span>
            </button>
        </nav>
    </div>

    <script>
        let state = {
            menus: JSON.parse(localStorage.getItem('custom_menus')) || [],
            currentView: 'list',
            editingIndex: null,
            tempApps: [],
            tempOwnerName: "",
            editingTempAppIndex: null,
            currentMenuIndex: null,
            currentFolderId: null,
            isInitialLoad: true,
            isDirectMode: false
        };

        const saveState = () => localStorage.setItem('custom_menus', JSON.stringify(state.menus));

        const fixDriveUrl = (url) => {
            if (!url) return "";
            const driveMatch = url.match(/\/file\/d\/([^\/\?]+)/) || url.match(/id=([^\&]+)/);
            if (driveMatch && (url.includes('drive.google.com') || url.includes('docs.google.com'))) {
                return `https://drive.google.com/thumbnail?authuser=0&sz=w600&id=${driveMatch[1]}`;
            }
            return url;
        };

        window.handleImgError = (img) => {
            img.style.display = 'none';
            const fallback = img.nextElementSibling;
            if (fallback) fallback.classList.remove('hidden');
        };

        const copyText = (textId) => {
            const copyInput = document.getElementById(textId);
            copyInput.select();
            document.execCommand("copy");
            const btn = document.getElementById('copy-btn');
            btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-500"></i>';
            lucide.createIcons();
            setTimeout(() => { btn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i>'; lucide.createIcons(); }, 2000);
        };

        const renderList = () => {
            const container = document.getElementById('main-content');
            const appWrapper = document.getElementById('app');
            
            appWrapper.className = appWrapper.className.replace('direct-bg', '');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('bottom-nav').style.transform = 'translateY(0)';
            document.getElementById('back-btn-header').classList.add('hidden');
            document.getElementById('view-title').innerText = "Dashboard";
            document.getElementById('view-subtitle').innerText = "Koleksi Proyek";

            if (state.menus.length === 0) {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center py-20 px-10 text-center animate-slide-up">
                        <div class="w-24 h-24 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mb-6 text-slate-200"><i data-lucide="layout" class="w-10 h-10"></i></div>
                        <h3 class="text-lg font-bold text-slate-800">Mulai Buat Proyek</h3>
                        <p class="text-sm text-slate-400 mt-2">Daftar dashboard Anda akan muncul di sini.</p>
                    </div>
                `;
            } else {
                container.innerHTML = `
                <div class="p-6 space-y-4">
                    ${state.menus.map((menu, idx) => `
                        <div class="bg-white rounded-[2rem] border border-slate-100 p-5 flex items-center gap-4 hover:border-indigo-100 transition-all animate-slide-up">
                            <div onclick="router.navigate('view', ${idx})" class="flex flex-1 items-center gap-4 cursor-pointer">
                                <div class="w-16 h-16 rounded-[1.25rem] bg-indigo-600 flex items-center justify-center text-white font-bold text-xl overflow-hidden shadow-xl shadow-indigo-50">
                                    ${menu.apps[0]?.icon ? `<img src="${fixDriveUrl(menu.apps[0].icon)}" class="w-full h-full object-cover" onerror="handleImgError(this)">` : ''}
                                    <span class="img-fallback ${menu.apps[0]?.icon ? 'hidden' : ''}">${menu.owner.charAt(0).toUpperCase()}</span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-900">${menu.owner}</h4>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${menu.apps.length} Item</span>
                                </div>
                            </div>
                            <div class="flex gap-0.5">
                                <button onclick="router.duplicateMenu(${idx})" class="p-2.5 text-slate-300 hover:text-indigo-600"><i data-lucide="copy" class="w-4 h-4"></i></button>
                                <button onclick="router.navigate('create', ${idx})" class="p-2.5 text-slate-300 hover:text-indigo-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="router.deleteMenu(${idx})" class="p-2.5 text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }
            lucide.createIcons();
        };

        const renderCreate = (editIndex = null) => {
            if (state.isInitialLoad) {
                if (editIndex !== null) {
                    state.editingIndex = editIndex;
                    state.tempApps = [...state.menus[editIndex].apps];
                    state.tempOwnerName = state.menus[editIndex].owner;
                } else {
                    state.editingIndex = null;
                    state.tempApps = [];
                    state.tempOwnerName = "";
                }
                state.editingTempAppIndex = null;
                state.isInitialLoad = false;
            }

            const isEdit = state.editingIndex !== null;
            const isEditingApp = state.editingTempAppIndex !== null;
            const container = document.getElementById('main-content');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('view-title').innerText = isEdit ? "Edit Space" : "New Space";
            
            const currentURL = window.location.origin + window.location.pathname;
            const shareURL = `${currentURL}?view=${encodeURIComponent(state.tempOwnerName || '')}`;
            const editAppData = isEditingApp ? state.tempApps[state.editingTempAppIndex] : { name: '', url: '', icon: '', isFolder: false, parentId: null };

            const folderOptions = state.tempApps.filter(a => a.isFolder && (isEditingApp ? a.id !== state.tempApps[state.editingTempAppIndex].id : true));

            container.innerHTML = `
                <div class="p-6 space-y-8 animate-slide-up pb-24">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">IDENTITAS PEMILIK</label>
                        <input type="text" id="owner-name" value="${state.tempOwnerName}" 
                            oninput="state.tempOwnerName = this.value; document.getElementById('share-url-input').value = '${currentURL}?view=' + encodeURIComponent(this.value)" 
                            placeholder="Contoh: Ramdan Studio" 
                            class="w-full p-5 rounded-[1.5rem] bg-slate-50 border-none outline-none font-bold text-slate-700 focus:ring-2 focus:ring-indigo-100 transition-all">
                    </div>

                    <div class="p-5 bg-slate-900 rounded-[2rem] space-y-4">
                        <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Shareable Direct Link</label>
                        <div class="flex gap-3 items-center">
                            <input type="text" id="share-url-input" value="${shareURL}" readonly 
                                class="flex-1 bg-white/5 text-white/50 text-[11px] outline-none font-mono truncate">
                            <button id="copy-btn" onclick="copyText('share-url-input')" class="text-indigo-400 p-2 bg-white/5 rounded-xl"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                    </div>

                    <div class="${isEditingApp ? 'bg-amber-50 ring-1 ring-amber-100' : 'bg-indigo-50/40'} p-6 rounded-[2.5rem] space-y-5 shadow-sm">
                        <div class="flex justify-between items-center">
                            <h3 class="text-[10px] font-black ${isEditingApp ? 'text-amber-600' : 'text-indigo-600'} uppercase tracking-widest">
                                ${isEditingApp ? 'EDIT ELEMEN' : 'TAMBAH ELEMEN BARU'}
                            </h3>
                            ${isEditingApp ? `<button onclick="router.cancelEditApp()" class="text-[10px] font-bold text-amber-700 bg-amber-100 px-2 py-1 rounded">Batal</button>` : ''}
                        </div>
                        
                        <div class="space-y-3">
                            <input type="text" id="new-app-name" value="${editAppData.name}" placeholder="Label / Nama Aplikasi" class="w-full p-4 rounded-xl bg-white outline-none text-sm font-semibold shadow-sm">
                            
                            <div class="flex items-center gap-3 px-1 py-1">
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <div class="relative">
                                        <input type="checkbox" id="is-folder" class="sr-only peer" ${editAppData.isFolder ? 'checked' : ''} onchange="document.getElementById('url-field').style.display = this.checked ? 'none' : 'block'">
                                        <div class="w-10 h-5 bg-slate-200 rounded-full peer peer-checked:bg-indigo-600 transition-all after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                                    </div>
                                    <span class="text-xs font-bold text-slate-600">Jadikan Folder (Parent)</span>
                                </label>
                            </div>

                            <div id="url-field" style="display: ${editAppData.isFolder ? 'none' : 'block'}">
                                <input type="url" id="new-app-url" value="${editAppData.url}" placeholder="URL Aplikasi (https://...)" class="w-full p-4 rounded-xl bg-white outline-none text-sm font-semibold shadow-sm">
                            </div>

                            <input type="url" id="new-app-icon" value="${editAppData.icon}" placeholder="URL Ikon (Drive/Web)" class="w-full p-4 rounded-xl bg-white outline-none text-sm font-semibold shadow-sm">

                            <div class="space-y-1.5">
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">LOKASI PENEMPATAN</label>
                                <select id="parent-id" class="w-full p-4 rounded-xl bg-white outline-none text-sm font-semibold shadow-sm appearance-none cursor-pointer">
                                    <option value="null">Menu Utama Dashboard</option>
                                    ${folderOptions.map(f => `<option value="${f.id}" ${editAppData.parentId === f.id ? 'selected' : ''}>Di dalam Folder: ${f.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <button onclick="router.addToTempList()" class="w-full ${isEditingApp ? 'bg-amber-500 shadow-amber-100' : 'bg-indigo-600 shadow-indigo-100'} text-white p-4 rounded-2xl text-xs font-extrabold uppercase tracking-widest shadow-xl transition-all active:scale-95">
                            ${isEditingApp ? 'Update Elemen' : 'Tambahkan Elemen'}
                        </button>
                    </div>

                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">STRUKTUR MENU (${state.tempApps.length})</label>
                        <div class="space-y-2.5">
                            ${state.tempApps.map((app, i) => `
                                <div class="flex items-center gap-4 p-4 bg-white rounded-2xl border border-slate-100 ${state.editingTempAppIndex === i ? 'ring-2 ring-amber-400' : ''}">
                                    <div class="w-12 h-12 rounded-[1rem] ${app.isFolder ? 'bg-indigo-50' : 'bg-slate-50'} flex items-center justify-center overflow-hidden shrink-0">
                                        ${app.icon ? `<img src="${fixDriveUrl(app.icon)}" class="w-full h-full object-cover" onerror="handleImgError(this)">` : ''}
                                        <div class="img-fallback flex items-center justify-center w-full h-full text-indigo-400">
                                            <i data-lucide="${app.isFolder ? 'folder' : 'globe'}" class="w-5 h-5"></i>
                                        </div>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2">
                                            <p class="text-sm font-bold text-slate-800 truncate">${app.name}</p>
                                            ${app.isFolder ? '<span class="text-[8px] bg-indigo-100 text-indigo-600 px-1.5 rounded-full font-black uppercase">Folder</span>' : ''}
                                        </div>
                                        <p class="text-[9px] text-slate-400 truncate mt-0.5">
                                            ${app.parentId !== "null" && app.parentId ? `Induk: ${state.tempApps.find(a => a.id === app.parentId)?.name || '?'}` : 'Menu Utama'}
                                        </p>
                                    </div>
                                    <div class="flex items-center">
                                        <button onclick="router.editTempApp(${i})" class="p-2 text-slate-300 hover:text-indigo-600 transition-all"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                        <button onclick="router.removeFromTemp(${i})" class="text-slate-300 p-2 hover:text-rose-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <button onclick="router.saveFinalMenu()" class="w-full bg-slate-900 text-white p-5 rounded-[2.5rem] font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all">
                        ${isEdit ? 'Update Dashboard' : 'Simpan Dashboard'}
                    </button>
                </div>
            `;
            lucide.createIcons();
        };

        const renderView = (index, folderId = null) => {
            state.currentMenuIndex = index;
            state.currentFolderId = folderId;
            const menu = state.menus[index];
            const container = document.getElementById('main-content');
            const header = document.getElementById('main-header');
            const bottomNav = document.getElementById('bottom-nav');
            const appWrapper = document.getElementById('app');
            
            bottomNav.style.transform = 'translateY(100%)';
            
            const visibleApps = menu.apps.filter(app => String(app.parentId) === String(folderId));
            const folderName = folderId ? menu.apps.find(a => a.id === folderId)?.name : null;

            if (state.isDirectMode && !folderId) {
                header.classList.add('hidden');
                appWrapper.classList.add('direct-bg');
            } else {
                header.classList.remove('hidden');
                appWrapper.classList.remove('direct-bg');
                document.getElementById('back-btn-header').classList.remove('hidden');
                document.getElementById('home-btn').classList.toggle('hidden', state.isDirectMode);
                
                document.getElementById('back-btn-header').onclick = () => {
                    if (folderId) {
                        const currentFolder = menu.apps.find(a => a.id === folderId);
                        renderView(index, currentFolder.parentId !== "null" ? currentFolder.parentId : null);
                    } else {
                        router.navigate('list');
                    }
                };

                document.getElementById('view-title').innerText = folderName || menu.owner;
                document.getElementById('view-subtitle').innerText = folderId ? "Folder Aktif" : "Preview Dashboard";
            }

            container.innerHTML = `
                <div class="flex-1 p-10 flex flex-col items-center animate-slide-up">
                    ${state.isDirectMode && !folderId ? `
                        <div class="w-full mb-16 text-left">
                            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 leading-none">${menu.owner}</h1>
                            <div class="flex items-center gap-2 mt-4">
                                <span class="h-1 w-8 bg-indigo-600 rounded-full"></span>
                                <p class="text-[10px] text-indigo-500 uppercase tracking-[0.3em] font-black">Personal Dashboard</p>
                            </div>
                        </div>
                    ` : ''}

                    ${folderId ? `
                         <div class="w-full mb-10 animate-slide-up">
                            <button onclick="renderView(${index}, ${menu.apps.find(a => a.id === folderId).parentId !== "null" ? `'${menu.apps.find(a => a.id === folderId).parentId}'` : 'null'})" class="flex items-center gap-2 text-indigo-600 font-bold text-xs">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i> Kembali ke ${menu.apps.find(a => a.id === folderId).parentId !== "null" ? 'Folder Sebelumnya' : 'Halaman Utama'}
                            </button>
                         </div>
                    ` : ''}

                    <div class="grid grid-cols-2 gap-x-12 gap-y-12 w-full pb-10">
                        ${visibleApps.map((app, i) => `
                            <div onclick="${app.isFolder ? `renderView(${index}, '${app.id}')` : `router.openBrowser('${app.url}', '${app.name}')`}" class="flex flex-col items-center gap-5 cursor-pointer group">
                                <div class="w-full aspect-square bg-white squircle flex items-center justify-center overflow-hidden relative">
                                    ${app.icon ? 
                                        `<img src="${fixDriveUrl(app.icon)}" referrerpolicy="no-referrer" class="w-full h-full object-cover absolute inset-0" onerror="handleImgError(this)">` : ''
                                    }
                                    <div class="img-fallback flex flex-col items-center justify-center w-full h-full ${app.icon ? 'hidden' : ''}">
                                        <i data-lucide="${app.isFolder ? 'folder-open' : 'external-link'}" class="w-10 h-10 ${app.isFolder ? 'text-indigo-400' : 'text-indigo-100'}"></i>
                                    </div>
                                    ${app.isFolder ? `
                                        <div class="absolute bottom-2 right-2 bg-indigo-600 text-white rounded-lg p-1 shadow-lg">
                                            <i data-lucide="layers" class="w-3 h-3"></i>
                                        </div>
                                    ` : ''}
                                </div>
                                <span class="font-bold text-sm text-slate-600 tracking-tight text-center group-active:text-indigo-600 transition-colors">${app.name}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons();
        };

        const renderBrowser = (url, name) => {
            const container = document.getElementById('main-content');
            const header = document.getElementById('main-header');
            const backBtnHeader = document.getElementById('back-btn-header');
            const appWrapper = document.getElementById('app');
            
            header.classList.remove('hidden');
            appWrapper.classList.remove('direct-bg');
            backBtnHeader.classList.remove('hidden');
            document.getElementById('header-nav').classList.remove('hidden');
            
            if (state.isDirectMode) document.getElementById('home-btn').classList.add('hidden');

            backBtnHeader.onclick = () => renderView(state.currentMenuIndex, state.currentFolderId);
            document.getElementById('view-title').innerText = name;
            document.getElementById('view-subtitle').innerText = "Aplikasi Berjalan";

            container.className = "flex-1 overflow-hidden p-0 relative bg-white";
            container.innerHTML = `
                <div class="absolute top-4 right-4 z-40">
                    <a href="${url}" target="_blank" class="bg-indigo-600 text-white p-3.5 rounded-2xl shadow-xl shadow-indigo-200 flex items-center gap-2 text-[10px] font-bold active:scale-95 transition-all">
                        <i data-lucide="external-link" class="w-4 h-4"></i> OPEN TAB
                    </a>
                </div>
                <iframe src="${url}" class="w-full h-full bg-white"></iframe>
            `;
            lucide.createIcons();
        };

        const router = {
            navigate: (view, param) => {
                const content = document.getElementById('main-content');
                const appWrapper = document.getElementById('app');
                content.className = "flex-1 overflow-y-auto custom-scrollbar flex flex-col";
                appWrapper.classList.remove('direct-bg');
                state.currentView = view;
                if (view !== 'create') state.isInitialLoad = true;

                if (view === 'list') renderList();
                if (view === 'create') renderCreate(param !== undefined ? param : null);
                if (view === 'view') renderView(param);
                if (view === 'browser') renderBrowser(param.url, param.name);
                if (view === 'settings') {
                    document.getElementById('main-header').classList.remove('hidden');
                    document.getElementById('bottom-nav').style.transform = 'translateY(0)';
                    content.innerHTML = `
                        <div class="p-8 space-y-6 flex-1 flex flex-col items-center justify-center animate-slide-up text-center">
                            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-[2rem] flex items-center justify-center mb-4"><i data-lucide="trash-2" class="w-10 h-10"></i></div>
                            <h2 class="text-xl font-bold">Pusat Data</h2>
                            <p class="text-sm text-slate-400 max-w-xs">Data disimpan secara lokal di perangkat Anda.</p>
                            <button onclick="router.clearAll()" class="mt-4 px-8 py-4 bg-rose-500 text-white rounded-[1.5rem] text-[10px] font-black uppercase tracking-widest shadow-xl shadow-rose-100 transition-all active:scale-95">Reset Data</button>
                        </div>`;
                    lucide.createIcons();
                }
                window.scrollTo(0,0);
            },
            duplicateMenu: (idx) => {
                const original = state.menus[idx];
                const duplicate = JSON.parse(JSON.stringify(original));
                duplicate.owner += " (Salinan)";
                state.menus.push(duplicate);
                saveState();
                renderList();
            },
            addToTempList: () => {
                const name = document.getElementById('new-app-name').value;
                const isFolder = document.getElementById('is-folder').checked;
                const url = isFolder ? "" : document.getElementById('new-app-url').value;
                const icon = document.getElementById('new-app-icon').value;
                const parentId = document.getElementById('parent-id').value;

                if (!name || (!isFolder && !url)) return alert("Lengkapi data!");
                
                const isEditingApp = state.editingTempAppIndex !== null;
                
                const appObj = { 
                    id: isEditingApp ? state.tempApps[state.editingTempAppIndex].id : Date.now().toString(),
                    name, 
                    url, 
                    icon, 
                    isFolder, 
                    parentId: parentId === "null" ? "null" : parentId 
                };

                if (state.editingTempAppIndex !== null) {
                    state.tempApps[state.editingTempAppIndex] = appObj;
                    state.editingTempAppIndex = null;
                } else {
                    state.tempApps.push(appObj);
                }
                state.tempOwnerName = document.getElementById('owner-name').value;
                renderCreate(state.editingIndex);
            },
            editTempApp: (i) => {
                state.tempOwnerName = document.getElementById('owner-name').value;
                state.editingTempAppIndex = i;
                renderCreate(state.editingIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            cancelEditApp: () => {
                state.editingTempAppIndex = null;
                renderCreate(state.editingIndex);
            },
            removeFromTemp: (i) => {
                state.tempApps.splice(i, 1);
                renderCreate(state.editingIndex);
            },
            saveFinalMenu: () => {
                const owner = document.getElementById('owner-name').value;
                if (!owner || state.tempApps.length === 0) return alert("Lengkapi data!");
                if (state.editingIndex !== null) {
                    state.menus[state.editingIndex] = { owner, apps: [...state.tempApps] };
                } else {
                    state.menus.push({ owner, apps: [...state.tempApps] });
                }
                saveState();
                state.tempApps = []; state.tempOwnerName = ""; state.isInitialLoad = true;
                router.navigate('list');
            },
            openBrowser: (url, name) => router.navigate('browser', {url, name}),
            deleteMenu: (idx) => { if (confirm("Hapus proyek ini?")) { state.menus.splice(idx, 1); saveState(); renderList(); } },
            clearAll: () => { if(confirm("Hapus semua data?")) { localStorage.clear(); location.reload(); } }
        };

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const viewName = urlParams.get('view');
            if (viewName) {
                const index = state.menus.findIndex(m => m.owner.toLowerCase() === viewName.toLowerCase());
                if (index !== -1) {
                    state.isDirectMode = true;
                    router.navigate('view', index);
                } else renderList();
            } else renderList();
            
            document.getElementById('home-btn').onclick = () => {
                window.history.replaceState({}, document.title, window.location.pathname);
                state.isDirectMode = false;
                router.navigate('list');
            };
        };
    </script>
</body>
</html>
